<!doctype html>
<html lang="pt-BR">
  <body style="font-family: Arial, sans-serif; line-height: 1.6; color: #172033;">
    <h1>Sua lição de hoje - {{ lesson.title }}</h1>
    <p>Olá, {{ subscriber.name }}.</p>
    <p>{{ lesson.content }}</p>
    <blockquote style="border-left: 4px solid #2563eb; margin: 20px 0; padding: 8px 16px; background: #f6f8fb;">
      {{ lesson.key_insight }}
    </blockquote>
    <h2>Pergunta do dia</h2>
    <p>{{ lesson.reflection_question }}</p>
    <p style="font-size: 12px; color: #667085;">
      Para cancelar, acesse <a href="{{ unsubscribe_url }}">este link</a>.
    </p>
  </body>
</html>
